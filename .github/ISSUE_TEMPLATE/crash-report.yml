name: Crash Report
description: Report an app crash (auto-filled by the app)
title: "Crash Report — "
labels: ["crash"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this crash. The app should have pre-filled most fields.
        Please add any context about what you were doing when the crash occurred.

  - type: input
    id: device
    attributes:
      label: Device
      description: Device model and Android version
      placeholder: "e.g. Samsung Galaxy S23, Android 14"
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App Version
      placeholder: "e.g. 4.0"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What were you doing when the crash occurred?
      placeholder: "e.g. App crashed immediately on launch / Crashed when switching voices"
    validations:
      required: true

  - type: textarea
    id: crash-log
    attributes:
      label: Crash Log
      description: Paste the crash log from the app (it was copied to your clipboard)
      render: text
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other info that might help (screenshots, steps to reproduce, etc.)
    validations:
      required: false
