name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3

      # Download pre-built sherpa-onnx Android AAR (includes Kokoro + Piper/VITS support)
      # Check latest release at: https://github.com/k2-fsa/sherpa-onnx/releases
      - name: Download sherpa-onnx AAR
        run: |
          mkdir -p app/libs
          VERSION="1.12.28"
          URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/v${VERSION}/sherpa-onnx-${VERSION}.aar"
          echo "Downloading sherpa-onnx AAR from $URL"
          curl -fL --retry 3 --retry-delay 5 "$URL" -o app/libs/sherpa_onnx.aar
          echo "AAR placed at app/libs/sherpa_onnx.aar"

      # Bundle the Kokoro TTS model into assets (no internet needed at runtime)
      - name: Bundle Kokoro model in assets
        run: |
          MODEL_URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/kokoro-multi-lang-v1_0.tar.bz2"
          ASSET_DIR="app/src/main/assets/kokoro-model"
          echo "Downloading Kokoro multi-lang model from $MODEL_URL"
          curl -fL --retry 3 --retry-delay 5 "$MODEL_URL" -o kokoro-model.tar.bz2
          echo "Extracting model to $ASSET_DIR"
          mkdir -p "$ASSET_DIR"
          tar -xjf kokoro-model.tar.bz2 -C "$ASSET_DIR" --strip-components=1
          rm kokoro-model.tar.bz2
          echo "Kokoro model files bundled:"
          ls -la "$ASSET_DIR"
          echo "Total size: $(du -sh "$ASSET_DIR" | cut -f1)"

      # Bundle ALL Piper/VITS voices into assets (fully offline, no downloads at runtime)
      # Voices sourced from: https://huggingface.co/rhasspy/piper-voices/tree/v1.0.0
      - name: Bundle all Piper voices in assets
        run: |
          PIPER_DIR="app/src/main/assets/piper-models"
          HF_BASE="https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0"
          mkdir -p "$PIPER_DIR"

          # Get tokens.txt from a sherpa-onnx Piper package (shared across all voices)
          LESSAC_URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/vits-piper-en_US-lessac-medium.tar.bz2"
          echo "Downloading Piper package (lessac) for shared tokens.txt"
          curl -fL --retry 3 --retry-delay 5 "$LESSAC_URL" -o piper-pkg.tar.bz2
          mkdir -p tmp-piper
          tar -xjf piper-pkg.tar.bz2 -C tmp-piper
          find tmp-piper -name "tokens.txt" -exec cp {} "$PIPER_DIR/tokens.txt" \;
          find tmp-piper -name "en_US-lessac-medium.onnx" -exec cp {} "$PIPER_DIR/en_US-lessac-medium.onnx" \;
          rm -rf tmp-piper piper-pkg.tar.bz2

          # All Piper voice IDs to bundle
          VOICES=(
            "en_US-amy-low"
            "en_US-amy-medium"
            "en_US-arctic-medium"
            "en_US-bryce-medium"
            "en_US-danny-low"
            "en_US-hfc_female-medium"
            "en_US-hfc_male-medium"
            "en_US-joe-medium"
            "en_US-john-medium"
            "en_US-kathleen-low"
            "en_US-kristin-medium"
            "en_US-kusal-medium"
            "en_US-l2arctic-medium"
            "en_US-lessac-low"
            "en_US-lessac-medium"
            "en_US-lessac-high"
            "en_US-libritts-high"
            "en_US-libritts_r-medium"
            "en_US-ljspeech-medium"
            "en_US-ljspeech-high"
            "en_US-norman-medium"
            "en_US-reza_ibrahim-medium"
            "en_US-ryan-low"
            "en_US-ryan-medium"
            "en_US-ryan-high"
            "en_US-sam-medium"
            "en_GB-alan-low"
            "en_GB-alan-medium"
            "en_GB-alba-medium"
            "en_GB-aru-medium"
            "en_GB-cori-medium"
            "en_GB-cori-high"
            "en_GB-jenny_dioco-medium"
            "en_GB-northern_english_male-medium"
            "en_GB-semaine-medium"
            "en_GB-southern_english_female-low"
            "en_GB-vctk-medium"
            "fr_FR-gilles-low"
            "fr_FR-mls-medium"
            "fr_FR-mls_1840-low"
            "fr_FR-siwis-low"
            "fr_FR-siwis-medium"
            "fr_FR-tom-medium"
            "fr_FR-upmc-medium"
          )

          for VOICE_ID in "${VOICES[@]}"; do
            # Skip if already downloaded
            if [ -f "$PIPER_DIR/${VOICE_ID}.onnx" ]; then
              echo "Already have $VOICE_ID — skipping"
              continue
            fi

            # Parse ID: en_US-lessac-medium → lang=en, locale=en_US, name=lessac, quality=medium
            LANG_CODE="${VOICE_ID%%_*}"
            COUNTRY=$(echo "$VOICE_ID" | sed 's/^[^_]*_//' | sed 's/-.*//')
            LOCALE="${LANG_CODE}_${COUNTRY}"
            REST=$(echo "$VOICE_ID" | sed "s/^${LOCALE}-//")
            QUALITY="${REST##*-}"
            NAME="${REST%-*}"

            URL="${HF_BASE}/${LANG_CODE}/${LOCALE}/${NAME}/${QUALITY}/${VOICE_ID}.onnx?download=true"
            echo "Downloading $VOICE_ID"
            curl -fL --retry 3 --retry-delay 5 "$URL" -o "$PIPER_DIR/${VOICE_ID}.onnx" || {
              echo "WARNING: Failed to download $VOICE_ID — skipping"
              rm -f "$PIPER_DIR/${VOICE_ID}.onnx"
            }
          done

          echo "All Piper voices bundled:"
          ls -la "$PIPER_DIR"
          echo "Total voices: $(ls -1 "$PIPER_DIR"/*.onnx 2>/dev/null | wc -l)"
          echo "Total size: $(du -sh "$PIPER_DIR" | cut -f1)"

      - run: chmod +x gradlew
      - run: ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: KokoroReader-v4
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
