name: Build APK
on:
  push:
    branches: [ main, master, 'claude/**' ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pr16-base
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3

      # Download pre-built sherpa-onnx Android AAR
      - name: Download sherpa-onnx AAR
        run: |
          mkdir -p app/libs
          VERSION="1.12.28"
          URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/v${VERSION}/sherpa-onnx-${VERSION}.aar"
          echo "Downloading sherpa-onnx AAR from $URL"
          curl -L "$URL" -o app/libs/sherpa_onnx.aar
          echo "AAR placed at app/libs/sherpa_onnx.aar ($(du -h app/libs/sherpa_onnx.aar | cut -f1))"

      - run: chmod +x gradlew
      - run: ./gradlew assembleRelease

      # Verify APK was built
      - name: Verify APK
        run: |
          APK=$(find app/build/outputs/apk/release/ -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK found!"
            exit 1
          fi
          echo "APK: $APK ($(du -h "$APK" | cut -f1))"

      - uses: actions/upload-artifact@v4
        with:
          name: KokoroReader-v3
          path: pr16-base/app/build/outputs/apk/release/app-release*.apk
          retention-days: 30
