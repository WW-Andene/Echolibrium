name: Build APK
on:
  push:
    branches: [ main, master, 'claude/**' ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3

      # Download sherpa-onnx AAR from our own tts-assets-v1 release
      - name: Download sherpa-onnx AAR
        run: |
          mkdir -p app/libs
          REPO="${GITHUB_REPOSITORY}"
          URL="https://github.com/${REPO}/releases/download/tts-assets-v1/sherpa_onnx.aar"
          echo "Downloading sherpa-onnx AAR from $URL"
          curl -fL --retry 3 --retry-delay 5 "$URL" -o app/libs/sherpa_onnx.aar
          echo "AAR placed at app/libs/sherpa_onnx.aar ($(du -h app/libs/sherpa_onnx.aar | cut -f1))"

      # Inject API keys into local.properties for BuildConfig
      - name: Write local.properties
        run: echo "DEEPINFRA_API_KEY=${{ secrets.DEEPINFRA_API_KEY }}" > local.properties

      - run: chmod +x gradlew
      - run: ./gradlew assembleRelease

      # Verify APK was built
      - name: Verify APK
        run: |
          APK=$(find app/build/outputs/apk/release/ -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK found!"
            exit 1
          fi
          echo "APK: $APK ($(du -h "$APK" | cut -f1))"

      - uses: actions/upload-artifact@v4
        with:
          name: Kyokan-v4
          path: app/build/outputs/apk/release/app-release*.apk
          retention-days: 30
