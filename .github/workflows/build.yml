name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3

      # Download pre-built sherpa-onnx Android AAR
      # Check latest release at: https://github.com/k2-fsa/sherpa-onnx/releases
      - name: Download sherpa-onnx AAR
        run: |
          mkdir -p app/libs
          VERSION="1.12.28"
          URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/v${VERSION}/sherpa-onnx-${VERSION}.aar"
          echo "Downloading sherpa-onnx AAR from $URL"
          curl -L "$URL" -o app/libs/sherpa_onnx.aar
          echo "AAR placed at app/libs/sherpa_onnx.aar"

      # Assemble SherpaTTS engine APK from the split zip files in the repo
      # (uploaded by maintainer as Sherpa_base1.zip + Sherpa_base2.zip + Sherpa_base3.zip)
      - name: Assemble SherpaTTS APK from repo
        run: |
          cat Sherpa_base1.zip Sherpa_base2.zip Sherpa_base3.zip > SherpaTTS-arm64-v8a.apk
          echo "SherpaTTS APK assembled from repo zip parts ($(stat -c%s SherpaTTS-arm64-v8a.apk) bytes)"

      - run: chmod +x gradlew
      - run: ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: KokoroReader-v3
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
      - uses: actions/upload-artifact@v4
        with:
          name: SherpaTTS-arm64-v8a
          path: SherpaTTS-arm64-v8a.apk
          retention-days: 30
