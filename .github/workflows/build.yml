name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3

      # Download pre-built sherpa-onnx Android AAR (includes Kokoro + Piper/VITS support)
      # Check latest release at: https://github.com/k2-fsa/sherpa-onnx/releases
      - name: Download sherpa-onnx AAR
        run: |
          mkdir -p app/libs
          VERSION="1.12.28"
          URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/v${VERSION}/sherpa-onnx-${VERSION}.aar"
          echo "Downloading sherpa-onnx AAR from $URL"
          curl -L "$URL" -o app/libs/sherpa_onnx.aar
          echo "AAR placed at app/libs/sherpa_onnx.aar"

      # Bundle the Kokoro TTS model into assets (no internet needed at runtime)
      - name: Bundle Kokoro model in assets
        run: |
          MODEL_URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/kokoro-multi-lang-v1_0.tar.bz2"
          ASSET_DIR="app/src/main/assets/kokoro-model"
          echo "Downloading Kokoro multi-lang model from $MODEL_URL"
          curl -L "$MODEL_URL" -o kokoro-model.tar.bz2
          echo "Extracting model to $ASSET_DIR"
          mkdir -p "$ASSET_DIR"
          tar -xjf kokoro-model.tar.bz2 -C "$ASSET_DIR" --strip-components=1
          rm kokoro-model.tar.bz2
          echo "Kokoro model files bundled:"
          ls -la "$ASSET_DIR"
          echo "Total size: $(du -sh "$ASSET_DIR" | cut -f1)"

      # Bundle default Piper/VITS voices into assets (local, no internet needed)
      # Each voice is a .onnx model + shared tokens.txt
      # Bundled: en_US-lessac-medium (F), en_US-ryan-medium (M), fr_FR-siwis-medium (F)
      - name: Bundle Piper voices in assets
        run: |
          PIPER_DIR="app/src/main/assets/piper-models"
          mkdir -p "$PIPER_DIR"

          # Download a full sherpa-onnx Piper package to get the shared tokens.txt
          LESSAC_URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/vits-piper-en_US-lessac-medium.tar.bz2"
          echo "Downloading Piper package (lessac) for tokens.txt + model"
          curl -L "$LESSAC_URL" -o piper-pkg.tar.bz2
          mkdir -p tmp-piper
          tar -xjf piper-pkg.tar.bz2 -C tmp-piper

          # Copy shared tokens.txt (same for all Piper/VITS espeak voices)
          find tmp-piper -name "tokens.txt" -exec cp {} "$PIPER_DIR/tokens.txt" \;

          # Copy en_US-lessac-medium model
          find tmp-piper -name "en_US-lessac-medium.onnx" -exec cp {} "$PIPER_DIR/en_US-lessac-medium.onnx" \;

          rm -rf tmp-piper piper-pkg.tar.bz2

          # Download additional Piper voices from sherpa-onnx releases
          RYAN_URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/vits-piper-en_US-ryan-medium.tar.bz2"
          echo "Downloading Piper voice: en_US-ryan-medium"
          curl -L "$RYAN_URL" -o piper-ryan.tar.bz2
          mkdir -p tmp-ryan
          tar -xjf piper-ryan.tar.bz2 -C tmp-ryan
          find tmp-ryan -name "en_US-ryan-medium.onnx" -exec cp {} "$PIPER_DIR/en_US-ryan-medium.onnx" \;
          rm -rf tmp-ryan piper-ryan.tar.bz2

          SIWIS_URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/vits-piper-fr_FR-siwis-medium.tar.bz2"
          echo "Downloading Piper voice: fr_FR-siwis-medium"
          curl -L "$SIWIS_URL" -o piper-siwis.tar.bz2
          mkdir -p tmp-siwis
          tar -xjf piper-siwis.tar.bz2 -C tmp-siwis
          find tmp-siwis -name "fr_FR-siwis-medium.onnx" -exec cp {} "$PIPER_DIR/fr_FR-siwis-medium.onnx" \;
          rm -rf tmp-siwis piper-siwis.tar.bz2

          echo "Piper voices bundled:"
          ls -la "$PIPER_DIR"
          echo "Total size: $(du -sh "$PIPER_DIR" | cut -f1)"

      - run: chmod +x gradlew
      - run: ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: KokoroReader-v4
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
