name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3

      # Download pre-built sherpa-onnx Android AAR
      # Check latest release at: https://github.com/k2-fsa/sherpa-onnx/releases
      - name: Download sherpa-onnx AAR
        run: |
          mkdir -p app/libs
          VERSION="1.12.28"
          URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/v${VERSION}/sherpa-onnx-v${VERSION}-android.tar.bz2"
          echo "Downloading sherpa-onnx from $URL"
          curl -L "$URL" -o sherpa-android.tar.bz2
          tar xjf sherpa-android.tar.bz2
          # Find the AAR file in the extracted directory
          find . -name "*.aar" | head -5
          cp $(find . -name "sherpa_onnx.aar" | head -1) app/libs/sherpa_onnx.aar
          echo "AAR placed at app/libs/sherpa_onnx.aar"

      - run: chmod +x gradlew
      - run: ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: KokoroReader-v3
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
