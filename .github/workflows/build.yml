name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3

      # Download pre-built sherpa-onnx Android AAR
      # Check latest release at: https://github.com/k2-fsa/sherpa-onnx/releases
      - name: Download sherpa-onnx AAR
        run: |
          mkdir -p app/libs
          VERSION="1.12.28"
          URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/v${VERSION}/sherpa-onnx-${VERSION}.aar"
          echo "Downloading sherpa-onnx AAR from $URL"
          curl -L "$URL" -o app/libs/sherpa_onnx.aar
          echo "AAR placed at app/libs/sherpa_onnx.aar"

      # Download and extract the Kokoro TTS model into assets
      # This bundles the model into the APK so no internet is needed at runtime
      - name: Bundle Kokoro model in assets
        run: |
          MODEL_URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/kokoro-en-v0_19.tar.bz2"
          ASSET_DIR="app/src/main/assets/kokoro-model"
          echo "Downloading Kokoro model from $MODEL_URL"
          curl -L "$MODEL_URL" -o kokoro-model.tar.bz2
          echo "Extracting model to $ASSET_DIR"
          mkdir -p "$ASSET_DIR"
          tar -xjf kokoro-model.tar.bz2 -C "$ASSET_DIR" --strip-components=1
          rm kokoro-model.tar.bz2
          echo "Model files bundled:"
          ls -la "$ASSET_DIR"
          echo "Total size: $(du -sh "$ASSET_DIR" | cut -f1)"

      - run: chmod +x gradlew
      - run: ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: KokoroReader-v4
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
