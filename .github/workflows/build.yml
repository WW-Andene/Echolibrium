name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3

      # Install onnxruntime for model optimization (ORT format conversion)
      - name: Install onnxruntime
        run: pip install onnxruntime

      # Downloads sherpa-onnx AAR, Kokoro model, and all 44 Piper voices.
      # Then converts models to ORT format for faster loading on device.
      - name: Download and optimize TTS models
        run: cd app && bash download-models.sh

      - run: chmod +x gradlew
      - run: ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: KokoroReader-v4
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
