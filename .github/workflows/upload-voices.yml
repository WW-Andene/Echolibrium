name: Upload TTS Assets to Release
on:
  workflow_dispatch:  # Manual trigger only

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all external TTS dependencies from k2-fsa
        run: |
          set -euo pipefail
          RETRY="--retry 3 --retry-delay 5"
          STAGING="staging"
          mkdir -p "$STAGING"

          SHERPA_VERSION="1.12.28"
          K2FSA_BASE="https://github.com/k2-fsa/sherpa-onnx/releases/download"

          # ── sherpa-onnx AAR ──
          echo "═══ sherpa-onnx AAR ═══"
          curl -fL $RETRY \
            "${K2FSA_BASE}/v${SHERPA_VERSION}/sherpa-onnx-${SHERPA_VERSION}.aar" \
            -o "$STAGING/sherpa_onnx.aar"
          echo "✓ sherpa_onnx.aar ($(du -h "$STAGING/sherpa_onnx.aar" | cut -f1))"

          # ── Piper voice tar.bz2 packages from k2-fsa ──
          # These are the ONLY compatible format for sherpa-onnx.
          # Each tar.bz2 is self-contained: {voiceId}.onnx + tokens.txt + espeak-ng-data/
          # DO NOT use HuggingFace .onnx files — they cause SIGSEGV with sherpa-onnx.
          echo ""
          echo "═══ Piper voice packages (k2-fsa tar.bz2) ═══"

          VOICES=(
            "en_US-lessac-medium"
            "en_US-ljspeech-medium"
            "en_US-kristin-medium"
            "en_US-ryan-medium"
            "en_US-joe-medium"
            "en_US-bryce-medium"
            "en_GB-alba-medium"
            "en_GB-alan-medium"
            "en_GB-cori-medium"
          )

          for VOICE_ID in "${VOICES[@]}"; do
            ARCHIVE="vits-piper-${VOICE_ID}.tar.bz2"
            URL="${K2FSA_BASE}/tts-models/${ARCHIVE}"
            echo "↓ $ARCHIVE"
            curl -fL $RETRY "$URL" -o "$STAGING/${ARCHIVE}" || echo "✗ FAILED: $ARCHIVE"
          done

          echo ""
          echo "Staging: $(ls -1 "$STAGING" | wc -l) files ($(du -sh "$STAGING" | cut -f1))"

      - name: Create release and upload all assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          STAGING="staging"

          # Create or reuse the release
          gh release create tts-assets-v1 \
            --title "TTS Assets v1" \
            --notes "All TTS dependencies for building and running Kyōkan/Echolibrium. Sources: k2-fsa/sherpa-onnx (compatible with sherpa-onnx runtime)." \
            2>/dev/null || echo "Release tts-assets-v1 already exists"

          # Upload everything
          for f in "$STAGING"/*; do
            echo "Upload: $(basename "$f") ($(du -h "$f" | cut -f1))"
            gh release upload tts-assets-v1 "$f" --clobber
          done

          echo ""
          echo "Done: $(ls -1 "$STAGING" | wc -l) assets uploaded to tts-assets-v1"
