name: Upload TTS Assets to Release
on:
  workflow_dispatch:  # Manual trigger only

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all external TTS dependencies
        run: |
          set -euo pipefail
          RETRY="--retry 3 --retry-delay 5"
          STAGING="staging"
          mkdir -p "$STAGING"

          SHERPA_VERSION="1.12.28"

          # ── sherpa-onnx AAR ──
          echo "═══ sherpa-onnx AAR ═══"
          curl -fL $RETRY \
            "https://github.com/k2-fsa/sherpa-onnx/releases/download/v${SHERPA_VERSION}/sherpa-onnx-${SHERPA_VERSION}.aar" \
            -o "$STAGING/sherpa_onnx.aar"
          echo "✓ sherpa_onnx.aar ($(du -h "$STAGING/sherpa_onnx.aar" | cut -f1))"

          # ── Kokoro model ──
          echo ""
          echo "═══ Kokoro model ═══"
          curl -fL $RETRY \
            "https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/kokoro-multi-lang-v1_0.tar.bz2" \
            -o "$STAGING/kokoro-multi-lang-v1_0.tar.bz2"
          echo "✓ kokoro-multi-lang-v1_0.tar.bz2 ($(du -h "$STAGING/kokoro-multi-lang-v1_0.tar.bz2" | cut -f1))"

          # ── Piper tokens.txt + all 44 voices ──
          echo ""
          echo "═══ Piper tokens.txt ═══"
          curl -fL $RETRY \
            "https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/vits-piper-en_US-lessac-medium.tar.bz2" \
            -o piper-pkg.tar.bz2
          mkdir -p tmp-piper
          tar -xjf piper-pkg.tar.bz2 -C tmp-piper
          find tmp-piper -name "tokens.txt" -exec cp {} "$STAGING/piper-tokens.txt" \;
          rm -rf tmp-piper piper-pkg.tar.bz2
          echo "✓ piper-tokens.txt"

          echo ""
          echo "═══ All 44 Piper voices ═══"
          HF_BASE="https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0"
          VOICES=(
            "en_US-amy-low" "en_US-amy-medium" "en_US-arctic-medium"
            "en_US-bryce-medium" "en_US-danny-low" "en_US-hfc_female-medium"
            "en_US-hfc_male-medium" "en_US-joe-medium" "en_US-john-medium"
            "en_US-kathleen-low" "en_US-kristin-medium" "en_US-kusal-medium"
            "en_US-l2arctic-medium" "en_US-lessac-low" "en_US-lessac-medium"
            "en_US-lessac-high" "en_US-libritts-high" "en_US-libritts_r-medium"
            "en_US-ljspeech-medium" "en_US-ljspeech-high" "en_US-norman-medium"
            "en_US-reza_ibrahim-medium" "en_US-ryan-low" "en_US-ryan-medium"
            "en_US-ryan-high" "en_US-sam-medium"
            "en_GB-alan-low" "en_GB-alan-medium" "en_GB-alba-medium"
            "en_GB-aru-medium" "en_GB-cori-medium" "en_GB-cori-high"
            "en_GB-jenny_dioco-medium" "en_GB-northern_english_male-medium"
            "en_GB-semaine-medium" "en_GB-southern_english_female-low"
            "en_GB-vctk-medium"
            "fr_FR-gilles-low" "fr_FR-mls-medium" "fr_FR-mls_1840-low"
            "fr_FR-siwis-low" "fr_FR-siwis-medium" "fr_FR-tom-medium"
            "fr_FR-upmc-medium"
          )

          for VOICE_ID in "${VOICES[@]}"; do
            LANG_CODE="${VOICE_ID%%_*}"
            COUNTRY=$(echo "$VOICE_ID" | sed 's/^[^_]*_//' | sed 's/-.*//')
            LOCALE="${LANG_CODE}_${COUNTRY}"
            REST=$(echo "$VOICE_ID" | sed "s/^${LOCALE}-//")
            QUALITY="${REST##*-}"
            NAME="${REST%-*}"
            URL="${HF_BASE}/${LANG_CODE}/${LOCALE}/${NAME}/${QUALITY}/${VOICE_ID}.onnx?download=true"
            echo "↓ $VOICE_ID"
            curl -fL $RETRY "$URL" -o "$STAGING/${VOICE_ID}.onnx" || echo "✗ FAILED: $VOICE_ID"
          done

          echo ""
          echo "Staging: $(ls -1 "$STAGING" | wc -l) files ($(du -sh "$STAGING" | cut -f1))"

      - name: Create release and upload all assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          STAGING="staging"

          # Create or reuse the release
          gh release create tts-assets-v1 \
            --title "TTS Assets v1" \
            --notes "All TTS dependencies for building and running Kyōkan/Echolibrium. Eliminates external fetching from HuggingFace and k2-fsa." \
            2>/dev/null || echo "Release tts-assets-v1 already exists"

          # Upload everything
          for f in "$STAGING"/*; do
            echo "Upload: $(basename "$f") ($(du -h "$f" | cut -f1))"
            gh release upload tts-assets-v1 "$f" --clobber
          done

          echo ""
          echo "Done: $(ls -1 "$STAGING" | wc -l) assets uploaded to tts-assets-v1"
