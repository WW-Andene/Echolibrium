name: Upload Voice Models to Release
on:
  workflow_dispatch:  # Manual trigger only

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to create releases and upload assets

    steps:
      - uses: actions/checkout@v4

      - name: Download all 44 Piper voices from HuggingFace
        run: |
          cd app
          PIPER_DIR="src/main/assets/piper-models"
          HF_BASE="https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0"
          RETRY="--retry 3 --retry-delay 5"
          mkdir -p "$PIPER_DIR"

          # Shared tokens.txt
          if [ ! -f "$PIPER_DIR/tokens.txt" ]; then
            LESSAC_URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/vits-piper-en_US-lessac-medium.tar.bz2"
            curl -fL $RETRY "$LESSAC_URL" -o piper-pkg.tar.bz2
            mkdir -p tmp-piper
            tar -xjf piper-pkg.tar.bz2 -C tmp-piper
            find tmp-piper -name "tokens.txt" -exec cp {} "$PIPER_DIR/tokens.txt" \;
            find tmp-piper -name "en_US-lessac-medium.onnx" -exec cp {} "$PIPER_DIR/en_US-lessac-medium.onnx" \;
            rm -rf tmp-piper piper-pkg.tar.bz2
          fi

          # All 44 voices
          VOICES=(
            "en_US-amy-low" "en_US-amy-medium" "en_US-arctic-medium"
            "en_US-bryce-medium" "en_US-danny-low" "en_US-hfc_female-medium"
            "en_US-hfc_male-medium" "en_US-joe-medium" "en_US-john-medium"
            "en_US-kathleen-low" "en_US-kristin-medium" "en_US-kusal-medium"
            "en_US-l2arctic-medium" "en_US-lessac-low" "en_US-lessac-medium"
            "en_US-lessac-high" "en_US-libritts-high" "en_US-libritts_r-medium"
            "en_US-ljspeech-medium" "en_US-ljspeech-high" "en_US-norman-medium"
            "en_US-reza_ibrahim-medium" "en_US-ryan-low" "en_US-ryan-medium"
            "en_US-ryan-high" "en_US-sam-medium"
            "en_GB-alan-low" "en_GB-alan-medium" "en_GB-alba-medium"
            "en_GB-aru-medium" "en_GB-cori-medium" "en_GB-cori-high"
            "en_GB-jenny_dioco-medium" "en_GB-northern_english_male-medium"
            "en_GB-semaine-medium" "en_GB-southern_english_female-low"
            "en_GB-vctk-medium"
            "fr_FR-gilles-low" "fr_FR-mls-medium" "fr_FR-mls_1840-low"
            "fr_FR-siwis-low" "fr_FR-siwis-medium" "fr_FR-tom-medium"
            "fr_FR-upmc-medium"
          )

          for VOICE_ID in "${VOICES[@]}"; do
            if [ -f "$PIPER_DIR/${VOICE_ID}.onnx" ]; then
              echo "✓ $VOICE_ID already exists"
              continue
            fi
            LANG_CODE="${VOICE_ID%%_*}"
            COUNTRY=$(echo "$VOICE_ID" | sed 's/^[^_]*_//' | sed 's/-.*//')
            LOCALE="${LANG_CODE}_${COUNTRY}"
            REST=$(echo "$VOICE_ID" | sed "s/^${LOCALE}-//")
            QUALITY="${REST##*-}"
            NAME="${REST%-*}"
            URL="${HF_BASE}/${LANG_CODE}/${LOCALE}/${NAME}/${QUALITY}/${VOICE_ID}.onnx?download=true"
            echo "↓ Downloading $VOICE_ID…"
            curl -fL $RETRY "$URL" -o "$PIPER_DIR/${VOICE_ID}.onnx" || echo "✗ FAILED: $VOICE_ID"
          done

          echo ""
          echo "Downloaded $(ls -1 "$PIPER_DIR"/*.onnx | wc -l) voice models"

      - name: Create release and upload non-bundled voices
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PIPER_DIR="app/src/main/assets/piper-models"

          # Voices bundled in APK — do NOT upload these
          BUNDLED="en_US-lessac-medium en_US-ryan-medium en_US-amy-medium en_US-joe-medium en_GB-alba-medium en_GB-alan-medium fr_FR-siwis-medium fr_FR-tom-medium"

          # Create or update the release
          gh release create voices-v1 \
            --title "Piper Voice Models v1" \
            --notes "Piper TTS voice models (.onnx) for on-demand download in Kyōkan/Echolibrium. These are automatically downloaded by the app when a user selects a non-bundled voice." \
            2>/dev/null || echo "Release voices-v1 already exists — uploading to it"

          # Upload non-bundled voices
          UPLOADED=0
          SKIPPED=0
          for f in "$PIPER_DIR"/*.onnx; do
            BASENAME=$(basename "$f" .onnx)
            if echo "$BUNDLED" | grep -qw "$BASENAME"; then
              echo "Skip (bundled): $BASENAME"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi
            echo "Upload: $BASENAME.onnx ($(du -h "$f" | cut -f1))"
            gh release upload voices-v1 "$f" --clobber || echo "✗ Failed to upload $BASENAME"
            UPLOADED=$((UPLOADED + 1))
          done

          # Also upload tokens.txt (needed by downloaded voices)
          if [ -f "$PIPER_DIR/tokens.txt" ]; then
            gh release upload voices-v1 "$PIPER_DIR/tokens.txt" --clobber
            echo "Uploaded tokens.txt"
          fi

          echo ""
          echo "Done: $UPLOADED uploaded, $SKIPPED skipped (bundled)"
