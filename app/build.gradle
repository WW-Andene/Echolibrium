plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}
android {
    namespace 'com.echolibrium.kyokan'
    compileSdk 34
    defaultConfig {
        applicationId "com.echolibrium.kyokan"
        minSdk 26
        targetSdk 34
        versionCode 3
        versionName "3.0"
        // Only include arm64 — Dimensity 8200 is arm64, keeps APK small
        ndk { abiFilters "arm64-v8a" }
    }
    signingConfigs {
        release {
            def ksFile = file("${rootProject.projectDir}/keystore.jks")
            if (ksFile.exists()) {
                storeFile ksFile
                storePassword "echolibrium123"
                keyAlias "echolibrium"
                keyPassword "echolibrium123"
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            def ksFile = file("${rootProject.projectDir}/keystore.jks")
            signingConfig ksFile.exists() ? signingConfigs.release : signingConfigs.debug
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions { jvmTarget = '17' }
    // Do not compress model files — they are extracted to filesystem at runtime
    aaptOptions { noCompress "onnx", "ort", "bin", "txt", "dict", "tab" }
    packagingOptions {
        jniLibs { useLegacyPackaging = true }
    }
}
dependencies {
    implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22'
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.preference:preference-ktx:1.2.1'
    implementation 'androidx.fragment:fragment-ktx:1.6.2'

    // Sherpa-onnx Android library (pre-built AAR downloaded by CI — see build.yml)
    implementation fileTree(dir: 'libs', include: ['*.aar', '*.jar'])

    // Direct ORT access for Yatagami/Lego pipeline (style sculpting, scale mapping)
    // sherpa_onnx.aar bundles libonnxruntime.so (v1.17.x), so we only need the Java API.
    // Exclude native libs to avoid duplicate .so conflicts.
    implementation('com.microsoft.onnxruntime:onnxruntime-android:1.17.0') {
        exclude group: 'com.microsoft.onnxruntime', module: 'onnxruntime-native'
    }

    // Tar.bz2 extraction for Kokoro model download
    implementation 'org.apache.commons:commons-compress:1.26.2'

    // ML Kit Translation (on-device, offline after model download)
    implementation 'com.google.mlkit:translate:17.0.3'
}
