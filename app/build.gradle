plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

// ── Auto-download TTS models before build ───────────────────────────────────
// Ensures the AAR, Kokoro model, and core Piper voices are present.
// Only 8 Piper voices are bundled — the rest are downloaded by the app on demand.
// Skips files that already exist (idempotent).

task downloadTtsModels(type: Exec) {
    description = 'Downloads sherpa-onnx AAR, Kokoro model, and core Piper voices if missing'
    group = 'setup'

    workingDir projectDir
    commandLine 'bash', 'download-models.sh'

    // Only run if key files are missing
    onlyIf {
        def aar = file("${projectDir}/libs/sherpa_onnx.aar")
        def model = file("${projectDir}/src/main/assets/kokoro-model/model.onnx")
        def tokens = file("${projectDir}/src/main/assets/piper-models/tokens.txt")
        def missing = !aar.exists() || !model.exists() || !tokens.exists()
        if (missing) {
            logger.lifecycle("TTS models missing — running download-models.sh")
        }
        return missing
    }
}

// Hook into the build: download models before any compilation starts
preBuild.dependsOn downloadTtsModels

android {
    namespace 'com.kokoro.reader'
    compileSdk 34
    defaultConfig {
        applicationId "com.kokoro.reader"
        minSdk 26
        targetSdk 34
        versionCode 4
        versionName "4.0"
        // Only include arm64 — Dimensity 8200 is arm64, keeps APK small
        ndk { abiFilters "arm64-v8a" }
    }
    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions { jvmTarget = '17' }
    // Must NOT compress model files — sherpa-onnx loads them directly via AssetManager
    // "ort" = pre-optimized bundled models, "onnx" = fallback if ORT conversion fails
    aaptOptions { noCompress "onnx", "ort", "bin" }
}
dependencies {
    implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22'
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.preference:preference-ktx:1.2.1'
    implementation 'androidx.fragment:fragment-ktx:1.6.2'

    // Sherpa-onnx Android library (auto-downloaded by downloadTtsModels task)
    implementation fileTree(dir: 'libs', include: ['*.aar', '*.jar'])
}
