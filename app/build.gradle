plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

// ── Auto-download TTS models before build ───────────────────────────────────
// Ensures the AAR, Kokoro model, and core Piper voices are present.
// Only 8 Piper voices are bundled — the rest are downloaded by the app on demand.
// Skips files that already exist (idempotent).

task downloadTtsModels(type: Exec) {
    description = 'Downloads sherpa-onnx AAR, Kokoro model, and core Piper voices if missing'
    group = 'setup'

    workingDir projectDir
    commandLine 'bash', 'download-models.sh'

    // Only run if key files are missing
    onlyIf {
        def aar = file("${projectDir}/libs/sherpa_onnx.aar")
        def modelOnnx = file("${projectDir}/src/main/assets/kokoro-model/model.onnx")
        def modelOrt = file("${projectDir}/src/main/assets/kokoro-model/model.ort")
        def tokens = file("${projectDir}/src/main/assets/piper-models/tokens.txt")
        def missing = !aar.exists() || (!modelOnnx.exists() && !modelOrt.exists()) || !tokens.exists()
        if (missing) {
            logger.lifecycle("TTS models missing — running download-models.sh")
        }
        return missing
    }
}

// Hook into the build: download models before any compilation starts
preBuild.dependsOn downloadTtsModels

android {
    namespace 'com.kokoro.reader'
    compileSdk 34

    signingConfigs {
        release {
            def ksFile = file("${rootProject.projectDir}/keystore.jks")
            if (ksFile.exists()) {
                storeFile ksFile
                storePassword System.getenv("KEYSTORE_PASSWORD") ?: ""
                keyAlias System.getenv("KEY_ALIAS") ?: "echolibrium"
                keyPassword System.getenv("KEY_PASSWORD") ?: ""
            }
        }
    }

    defaultConfig {
        applicationId "com.kokoro.reader"
        minSdk 26
        targetSdk 34
        versionCode 4
        versionName "4.0"
        // Only include arm64 — Dimensity 8200 is arm64, keeps APK small
        ndk { abiFilters "arm64-v8a" }

        // GitHub token for auto-reporting crash logs to Issues.
        // Set in local.properties (not committed): github.issues.token=ghp_xxx
        // Or via environment variable: GITHUB_ISSUES_TOKEN=ghp_xxx
        def ghToken = ""
        def localProps = new File(rootProject.projectDir, "local.properties")
        if (localProps.exists()) {
            def props = new Properties()
            props.load(localProps.newDataInputStream())
            ghToken = props.getProperty("github.issues.token", "")
        }
        if (ghToken.isEmpty()) ghToken = System.getenv("GITHUB_ISSUES_TOKEN") ?: ""
        buildConfigField "String", "GITHUB_ISSUES_TOKEN", "\"${ghToken}\""
    }
    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            def ksFile = file("${rootProject.projectDir}/keystore.jks")
            if (ksFile.exists()) {
                signingConfig signingConfigs.release
            }
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    buildFeatures { buildConfig true }
    kotlinOptions { jvmTarget = '17' }
    // Do not compress model files or espeak-ng data — they are extracted to filesystem
    // at first run. Compressed assets use more memory during extraction and are slower
    // to read via AssetManager.open(). "txt" covers tokens.txt and espeak dict files.
    aaptOptions { noCompress "onnx", "ort", "bin", "txt", "dict", "tab" }
    // Load native libs directly from APK via mmap (default behavior).
    // The standalone sherpa-onnx APK (Sherpa_base*.zip) uses this same approach
    // and works correctly on Xiaomi 13T / Dimensity 8200 / HyperOS 2.0.
    // Previous useLegacyPackaging=true was added speculatively but was never the
    // cause of crashes — the real issues were ORT version mismatch and HyperOS
    // process killing.
    packagingOptions {
        jniLibs {
            useLegacyPackaging = false
        }
    }
}
dependencies {
    implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22'
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.preference:preference-ktx:1.2.1'
    implementation 'androidx.fragment:fragment-ktx:1.6.2'

    // Sherpa-onnx Android library (auto-downloaded by downloadTtsModels task)
    implementation fileTree(dir: 'libs', include: ['*.aar', '*.jar'])
}
